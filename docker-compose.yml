services:
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
      - MONGO_INITDB_DATABASE=${DB_NAME}
    volumes:
      - ./docker/mongo-entrypoint.sh:/mongo-entrypoint.sh:ro
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    entrypoint: [ "/mongo-entrypoint.sh" ]
    ports:
      - "${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: [ "CMD", "mongosh", "--host", "localhost", "--port", "${DB_PORT}", "-u", "${DB_USER}", "-p", "${DB_PASSWORD}", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-init-rs:
    image: mongo:8.0
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./docker/rs-init.sh:/rs-init.sh:ro
    entrypoint: [ "/bin/bash", "/rs-init.sh" ]
    restart: "no"

volumes:
  mongodb_data:
  mongodb_config: